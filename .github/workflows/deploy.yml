name: CI - Build & Push Image

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nestjs-argocd

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG} .
          docker build -t ghcr.io/${{ env.IMAGE_NAME }}:latest .
          docker push ghcr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag
        run: |
          cd gitops
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" environments/dev/values.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "Update nestjs image to ${{ github.sha }}"
          git push